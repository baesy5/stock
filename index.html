<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>주식 분석 대시보드</title>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/tailwindcss/2.2.19/tailwind.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .chart-container { position: relative; height: 300px; width: 100%; }
  </style>
</head>
<body class="bg-gray-100 font-sans leading-normal tracking-normal">

  <div class="container mx-auto p-6 max-w-5xl">
    
    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6">
      <div class="bg-gradient-to-br from-indigo-500 to-purple-600 p-5 rounded-lg shadow-md text-white">
        <p class="text-xs uppercase font-bold text-indigo-200">💵 원/달러 환율</p>
        <p id="macroUSDKRW" class="text-2xl font-bold mt-1">로딩 중...</p>
      </div>
      <div class="bg-gradient-to-br from-yellow-500 to-amber-600 p-5 rounded-lg shadow-md text-white">
        <p class="text-xs uppercase font-bold text-yellow-200">✨ 국제 금 선물 (GCW00)</p>
        <p id="macroGold" class="text-2xl font-bold mt-1">로딩 중...</p>
      </div>
      <div class="bg-gradient-to-br from-red-500 to-orange-600 p-5 rounded-lg shadow-md text-white">
        <p class="text-xs uppercase font-bold text-red-200">🪵 국제 구리 선물 (HGW00)</p>
        <p id="macroCopper" class="text-2xl font-bold mt-1">로딩 중...</p>
      </div>
    </div>

    <div class="bg-white p-6 rounded-lg shadow-md mb-6">
      <h1 class="text-2xl font-bold text-gray-800 mb-4">📈 주식 분석 대시보드 (최근 1년)</h1>
      <div class="flex flex-wrap gap-3 items-center">
        <input type="text" id="tickerInput" placeholder="예: 005930 또는 AAPL" class="border border-gray-300 p-2 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 w-64">
        <button onclick="loadDashboard()" id="searchBtn" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-6 rounded-md transition duration-200">조회하기</button>
        <span id="loadingText" class="text-blue-600 font-medium hidden animate-pulse">데이터 분석 중...</span>
      </div>
    </div>

    <div id="summaryCards" class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-6 hidden">
      <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-blue-500">
        <p class="text-sm text-gray-500 uppercase font-bold">현재가 / 종가</p>
        <p id="cardPrice" class="text-2xl font-semibold text-gray-800">0</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-green-500">
        <p class="text-sm text-gray-500 uppercase font-bold">1년 누적 수익률</p>
        <p id="cardReturn" class="text-2xl font-semibold text-gray-800">0%</p>
      </div>
      <div class="bg-white p-6 rounded-lg shadow-md border-l-4 border-red-500">
        <p class="text-sm text-gray-500 uppercase font-bold">최대 낙폭 (MDD)</p>
        <p id="cardMDD" class="text-2xl font-semibold text-gray-800">0%</p>
      </div>
    </div>

    <div id="chartSection" class="grid grid-cols-1 md:grid-cols-2 gap-6 hidden">
      <div class="bg-white p-4 rounded-lg shadow-md">
        <h3 class="text-lg font-semibold text-gray-700 mb-2">누적 수익률 추이 (%)</h3>
        <div class="chart-container">
          <canvas id="returnChart"></canvas>
        </div>
      </div>
      <div class="bg-white p-4 rounded-lg shadow-md">
        <h3 class="text-lg font-semibold text-gray-700 mb-2">MDD (Maximum Drawdown) (%)</h3>
        <div class="chart-container">
          <canvas id="mddChart"></canvas>
        </div>
      </div>
    </div>
  </div>

  <script>
    // ⚠️ 여기에 구글 앱스 크립트 '배포' 후 생성된 웹 앱 URL(exec로 끝나는 주소)을 붙여넣으세요.
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzHZ1n5Da6DSiKD11enIUZd10ArNB_sNS1MB35EctOItHkfSu0w4pySXuzMM8jEhdSa/exec";

    let returnChartInstance = null;
    let mddChartInstance = null;

    // 🌟 [추가된 부분] 페이지 로드 시 원달러, 금, 구리 가격 자동 조회
    window.addEventListener('DOMContentLoaded', () => {
      if (!WEB_APP_URL.includes("XXXXX")) {
        fetchMacroIndicators("USDKRW", "macroUSDKRW", "원");
        fetchMacroIndicators("COMEX:GCW00", "macroGold", "$");
        fetchMacroIndicators("COMEX:HGW00", "macroCopper", "$");
      }
    });

    // 매크로 경제 지표 전용 비동기 fetch 함수
    function fetchMacroIndicators(ticker, elementId, unit) {
      const url = `${WEB_APP_URL}?ticker=${encodeURIComponent(ticker)}`;
      fetch(url)
        .then(res => res.json())
        .then(data => {
          if(data.success) {
            document.getElementById(elementId).innerText = unit === "원" ? `${data.currentPrice} ${unit}` : `${unit} ${data.currentPrice}`;
          } else {
            document.getElementById(elementId).innerText = "불러오기 실패";
          }
        })
        .catch(() => {
          document.getElementById(elementId).innerText = "네트워크 에러";
        });
    }

    function loadDashboard() {
      const ticker = document.getElementById('tickerInput').value.trim();
      if (!ticker) {
        alert('주식 코드를 입력해주세요.');
        return;
      }

      if (WEB_APP_URL.includes("XXXXX")) {
        alert('WEB_APP_URL 변수에 본인의 구글 앱스 크립트 웹 앱 주소를 먼저 설정해주세요!');
        return;
      }

      // UI 제어
      document.getElementById('searchBtn').disabled = true;
      document.getElementById('loadingText').classList.remove('hidden');

      // 외부 웹사이트 방식으로 구글 Apps Script API 호출 (CORS/Redirect 대응)
      const targetUrl = `${WEB_APP_URL}?ticker=${encodeURIComponent(ticker)}`;

      fetch(targetUrl)
        .then(response => response.json())
        .then(response => {
          document.getElementById('searchBtn').disabled = false;
          document.getElementById('loadingText').classList.add('hidden');

          if (!response.success) {
            alert(response.message);
            return;
          }

          // 요약 데이터 매핑
          document.getElementById('summaryCards').classList.remove('hidden');
          document.getElementById('chartSection').classList.remove('hidden');
          
          document.getElementById('cardPrice').innerText = response.currentPrice;
          
          const retEl = document.getElementById('cardReturn');
          retEl.innerText = response.finalReturn + '%';
          retEl.className = response.finalReturn >= 0 ? "text-2xl font-semibold text-red-500" : "text-2xl font-semibold text-blue-500";

          document.getElementById('cardMDD').innerText = response.maxDrawdown + '%';

          // 차트 그리기
          renderCharts(response.dates, response.returns, response.mdds, response.ticker);
        })
        .catch(error => {
          document.getElementById('searchBtn').disabled = false;
          document.getElementById('loadingText').classList.add('hidden');
          alert('서버 통신 중 오류가 발생했습니다: ' + error);
        });
    }

    function renderCharts(labels, returnData, mddData, ticker) {
      if (returnChartInstance) returnChartInstance.destroy();
      if (mddChartInstance) mddChartInstance.destroy();

      // 1. 수익률 차트
      const ctxReturn = document.getElementById('returnChart').getContext('2d');
      returnChartInstance = new Chart(ctxReturn, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: `${ticker} 수익률 (%)`,
            data: returnData,
            borderColor: '#10B981',
            backgroundColor: 'rgba(16, 185, 129, 0.1)',
            fill: true,
            borderWidth: 2,
            pointRadius: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { ticks: { callback: value => value + '%' } }
          }
        }
      });

      // 2. MDD 차트
      const ctxMdd = document.getElementById('mddChart').getContext('2d');
      mddChartInstance = new Chart(ctxMdd, {
        type: 'line',
        data: {
          labels: labels,
          datasets: [{
            label: `${ticker} MDD (%)`,
            data: mddData,
            borderColor: '#EF4444',
            backgroundColor: 'rgba(239, 68, 68, 0.1)',
            fill: true,
            borderWidth: 2,
            pointRadius: 0
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: false,
          scales: {
            y: { 
              max: 0, 
              ticks: { callback: value => value + '%' } 
            }
          }
        }
      });
    }
  </script>
</body>
</html>
